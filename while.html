<!DOCTYPE html>
<html>
    <head>
        <title>Estrutura de Repetição</title>

        <script>
            let contador = 1 
            const qtd = prompt('Quantas notas ?')
            let soma = 0
            let nota = 0
            while(contador <= qtd){

                do{
                nota = Number(prompt('Digite nota' + contador))
               }while(nota > 10)
                soma = soma + nota
                contador ++
            }

            console.log('soma: '+ soma)
            console.log('nota: '+ nota)

            const media = soma/qtd
            console.log('media:'+ soma/qtd)

            const resultado  =  media >= 7 ? 'Aprovado' : 'Reprovado'
            console.log('Resultado: ' + resultado)

        </script>

    </head>

    </body>


</html>
